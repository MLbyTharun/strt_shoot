
research_task:
  description: >
    Research everything you can find about {company}. Use your tools to gather:
    1. What does the company do? (product, customers, use case)
    2. Founding story — who started it, when, and why?
    3. Funding history — total raised, latest round, key investors
    4. Team — CEO background, key hires, team size
    5. Recent news — last 6 months of press, product launches, partnerships
    6. Any controversies, layoffs, or challenges

    Important: Never guess or estimate funding amounts. If you can't find verified
    data, mark it as [UNVERIFIED] rather than filling in numbers.
  expected_output: >
    A detailed research dump with all findings organized by category.
    Each fact should note its source. Uncertain info marked with [UNVERIFIED].
  agent: researcher

analysis_task:
  description: >
    Important: If you cannot find any credible information about {company} in your first tool call , dont make any other tool calls  
    after searching, do NOT make up information. Instead, respond with exactly:

    "COMPANY_NOT_FOUND: No information found for '{company}'. 
    Did you mean: [suggest 1-2 similar company names if possible]?"
      
    Only do this if you genuinely cannot find anything — not just because 
    information is limited.
    Using the research on {company}, perform a competitive and business analysis:
    1. Business model — how do they make money?
    2. Target market — who are their customers and what's the market size?
    3. Top 3-5 competitors — name them and explain how {company} differs
    4. Key strengths and weaknesses
    5. What's their moat (if any)?
    6. Growth signals — any signs of traction or momentum?
    IMPORTANT : Use the CompanyIntelligenceTool only to research COMPETITORS, 
    not {company} itself — that research is already provided in context.
  expected_output: >
    A structured analysis covering business model, market, competitors,
    strengths/weaknesses, and moat. Be specific — avoid vague statements.
  agent: analyst
  context:
    - research_task

writing_task:
  description: >
    Using the research and analysis provided, write a polished company brief for {company}.

    Format it exactly like this:

    # {company} — Company Brief

    ## TL;DR
    (2-3 sentence summary — what they do, stage, why they matter)

    ## Product & Business Model
    ## Founding & Team
    ## Funding
    ## Market & Competitors
    ## Recent News & Momentum
    ## Risks & Challenges

    Rules:
    - Only use facts from the research provided — do not add anything new
    - Keep each section concise but informative
    - Use bullet points inside sections
    - Mark anything uncertain as [UNVERIFIED]
  expected_output: >
    A clean, well-formatted markdown brief that someone could read in 3 minutes
    and walk away knowing everything important about the company.
  agent: writer
  context:
    - research_task