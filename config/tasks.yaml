
research_task:
  description: >
    You are given the company name: {company}. 

    Use the Tavily Search tool to conduct comprehensive, multi-angle searches. 
    Run searches for:
    1. "{company} what they are building" 
    2. "{company} YC funding OR wellfound OR crunchbase OR seed OR series A"
    3. "{company} customer complaints OR problems OR limitations OR market gaps"

    Compile your findings into a structured brief. You must discover:
    1. Core Product/Service: What exactly are they building right now?
    2. Funding & Backing: Have they gone through Y Combinator? Are they on Wellfound/AngelList? What's their latest known funding round (Seed, Series A, etc.)?
    3. Problem Solved: What customer pain point are they actively fixing?
    4. Active Problems/Limitations: What internal struggles, customer complaints, or technical limitations does the company currently face?

  expected_output: >
     A detailed markdown report titled "Company Teardown: {company}" containing the four sections above, backed exclusively by your search results.
  agent: researcher

analysis_task:
  description: >
    Review the Company Teardown provided by the Startup Intelligence Analyst. Based on their current product, limitations, and market position, you must design an AI/GenAI/Agentic AI improvement strategy that i can implement for them.

    Your strategy must be split into two distinct parts:
     1. The Developer Action Plan: Practical, high-impact AI/Agentic AI implementations I can build for them. (e.g., automating a manual process they currently do, building a multi-agent RAG system for their data, fine-tuning a model for their specific use case).that an person targeting {company} for a job or internship can build and present to the CEO as a demonstration of their value.
     2. The CEO Pitch: How to frame these improvements so the CEO gets impressed. Focus on business value: competitive moats, cost reduction, user retention, or opening up new revenue streams. Explain *why* the CEO should value your development time.
     3. Tips for someone who is targeting {company} for an job or internship , including what should he build for them under a day before reaching to the CEO and how to frame it in a way that makes the CEO want to hire them.

    Do not suggest generic "add chatbots." Suggest cutting-edge Agentic AI, GenAI pipelines, multi-agent swarms, or advanced RAG implementations specifically tailored to their exact product and problems.

  expected_output: >
    A persuasive, highly technical yet business-focused markdown document titled "AI Transformation Blueprint for {company}". Include a section specifically drafted to be sent directly to the CEO as a "cold opener" pitch.
    A markdown document titled "What should an intern do for {company}" with a list of actionable steps and projects that an intern can build to demonstrate their value to the company.

  agent: analyst
  context:
    - research_task
